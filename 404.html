<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page Not Found | Vaibhav Singhal</title>
    <link rel="canonical" href="https://vaibhavsinghal.dev/" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%236c63ff'/><stop offset='100%25' stop-color='%2300d4aa'/></linearGradient></defs><rect width='32' height='32' rx='6' fill='%230a0a1a'/><text x='16' y='22' text-anchor='middle' font-family='sans-serif' font-weight='700' font-size='16' fill='url(%23g)'>VS</text></svg>"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Space Grotesk", sans-serif;
        background: #030308;
        color: #e8e8f0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
      }
      .wrap {
        max-width: 480px;
      }
      .code {
        font-family: "JetBrains Mono", monospace;
        font-size: 6rem;
        font-weight: 700;
        background: linear-gradient(135deg, #6c63ff, #00d4aa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        margin-bottom: 16px;
      }
      h1 {
        font-size: 1.4rem;
        font-weight: 600;
        margin-bottom: 12px;
      }
      p {
        color: #8c8ca4;
        font-size: 0.95rem;
        margin-bottom: 32px;
        line-height: 1.6;
      }
      a {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 28px;
        border-radius: 10px;
        font-size: 0.9rem;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(135deg, #6c63ff, #00d4aa);
        text-decoration: none;
        transition:
          box-shadow 0.3s ease,
          transform 0.3s ease;
      }
      a:hover {
        box-shadow: 0 4px 28px rgba(108, 99, 255, 0.5);
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="code">404</div>
      <h1>Page not found</h1>
      <p>The page you're looking for doesn't exist or has been moved.</p>
      <a href="/">Back to Home</a>
    </div>
  </body>
</html>
