    <rect x="550" y="210" width="155" height="80" rx="12" fill="#00d4aa" opacity="0.08"/>
    <text x="627" y="235" text-anchor="middle" font-size="9" fill="#12f0c6" font-family="'Segoe UI', system-ui, sans-serif" font-weight="600" letter-spacing="2">OUTPUT</text>
    <text x="627" y="258" text-anchor="middle" font-size="18" fill="#f0f0f8" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700">Synthesizer</text>
  </g>

