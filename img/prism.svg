<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#04100e"/>
      <stop offset="50%" stop-color="#09241f"/>
      <stop offset="100%" stop-color="#020807"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="50%" stop-color="#12f0c6"/>
      <stop offset="100%" stop-color="#b8fff1"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="48%" stop-color="#ffffff" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b83ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#dfe9ff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#00d4aa" stop-opacity="0"/>
    </linearGradient>
    <filter id="glassBlur">
      <feGaussianBlur stdDeviation="0.35"/>
    </filter>
    <filter id="glowSoft">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <marker id="arrowTealSoft" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#12f0c6" opacity="0.4"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <path d="M -90 125 C 110 54 270 58 480 126 S 708 194 890 82 L 890 178 C 684 252 520 214 332 164 S 84 172 -90 244 Z" fill="url(#shine)" opacity="0.18"/>
  <rect x="22" y="22" width="756" height="456" rx="26" fill="none" stroke="url(#rim)" stroke-width="1.1" opacity="0.7"/>

  <!-- Subtle grid dots -->
  <g opacity="0.07">
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#ffffff"/>
    </pattern>
    <rect width="800" height="500" fill="url(#dots)"/>
  </g>

  <!-- Ambient glow blobs -->
  <circle cx="160" cy="260" r="160" fill="#00d4aa" opacity="0.05" filter="url(#glowSoft)"/>
  <circle cx="400" cy="260" r="180" fill="#12f0c6" opacity="0.04" filter="url(#glowSoft)"/>
  <circle cx="640" cy="260" r="160" fill="#b8fff1" opacity="0.05" filter="url(#glowSoft)"/>

  <!-- Title -->
  <text x="400" y="55" text-anchor="middle" font-size="36" font-weight="800" fill="url(#titleGrad)" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" letter-spacing="10">PRISM</text>
  <text x="400" y="79" text-anchor="middle" font-size="10" fill="#9fd4c7" font-family="'Segoe UI', system-ui, sans-serif" letter-spacing="3.2" font-weight="400">REUSABLE AI MICROSERVICES</text>

  <text x="400" y="118" text-anchor="middle" font-size="8" fill="#12f0c6" font-family="'Segoe UI', system-ui, sans-serif" opacity="0.65" letter-spacing="1.5">GATEWAYED PLATFORM SERVICES</text>
  <g stroke="#12f0c6" stroke-width="1.2" fill="none" opacity="0.32">
