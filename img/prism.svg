    <text x="402" y="235" text-anchor="middle" font-size="9" fill="#12f0c6" font-family="'Segoe UI', system-ui, sans-serif" font-weight="600" letter-spacing="2">AI EXECUTOR</text>
    <text x="402" y="258" text-anchor="middle" font-size="20" fill="#f0f0f8" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700">Cortex</text>
