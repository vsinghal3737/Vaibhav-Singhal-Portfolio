    <text x="0" y="12" font-size="9" fill="#9fd4c7" font-family="'Segoe UI', system-ui, sans-serif" font-weight="400" letter-spacing="1">POWERS</text>
    <rect x="60" y="0" width="65" height="20" rx="10" fill="#7c73ff" opacity="0.2" stroke="#7c73ff" stroke-width="0.5" stroke-opacity="0.4"/>
    <text x="92" y="13" text-anchor="middle" font-size="9" fill="#b49dff" font-family="'Segoe UI', system-ui, sans-serif" font-weight="600">Axiom</text>
