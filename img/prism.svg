    <text x="285" y="13" text-anchor="middle" font-size="7" fill="#12f0c6" font-family="'Segoe UI', system-ui, sans-serif" font-weight="600" letter-spacing="1">BILLING</text>
    <text x="285" y="25" text-anchor="middle" font-size="9" fill="#e8fff9" font-family="'Segoe UI', system-ui, sans-serif" font-weight="500">Cost Tracking</text>

    <rect x="355" y="0" width="100" height="30" rx="6" fill="#0b2a27" stroke="#00d4aa" stroke-width="0.8" opacity="0.7"/>
    <text x="405" y="13" text-anchor="middle" font-size="7" fill="#12f0c6" font-family="'Segoe UI', system-ui, sans-serif" font-weight="600" letter-spacing="1">RESILIENCE</text>
    <text x="405" y="25" text-anchor="middle" font-size="9" fill="#e8fff9" font-family="'Segoe UI', system-ui, sans-serif" font-weight="500">Fallback Chain</text>

    <rect x="470" y="0" width="115" height="30" rx="6" fill="#0b2a27" stroke="#00d4aa" stroke-width="0.8" opacity="0.7"/>
