    <text x="527" y="25" text-anchor="middle" font-size="9" fill="#e8fff9" font-family="'Segoe UI', system-ui, sans-serif" font-weight="500">Multi-Provider</text>

    <rect x="600" y="0" width="120" height="30" rx="6" fill="#17101a" stroke="#ff6b9d" stroke-width="0.8" opacity="0.7"/>
    <text x="660" y="13" text-anchor="middle" font-size="7" fill="#ff8db5" font-family="'Segoe UI', system-ui, sans-serif" font-weight="600" letter-spacing="1">NETWORK</text>
    <text x="660" y="25" text-anchor="middle" font-size="9" fill="#e8c8d8" font-family="'Segoe UI', system-ui, sans-serif" font-weight="500">prism-network</text>
