  <g filter="url(#nodeShadow)">
    <rect x="630" y="140" width="140" height="44" rx="10" fill="#17101a" stroke="#ff6b9d" stroke-width="1" stroke-dasharray="4 3"/>
    <rect x="630" y="140" width="140" height="44" rx="10" fill="#ff6b9d" opacity="0.06"/>
