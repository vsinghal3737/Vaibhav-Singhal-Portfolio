<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#0c1614"/>
      <stop offset="50%" stop-color="#10201c"/>
      <stop offset="100%" stop-color="#0a1310"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="50%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
    <filter id="glowSoft">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00d4aa" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <g opacity="0.07">
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#ffffff"/>
    </pattern>
    <rect width="800" height="500" fill="url(#dots)"/>
  </g>

  <!-- Ambient glow blobs -->
  <circle cx="160" cy="260" r="160" fill="#00d4aa" opacity="0.05" filter="url(#glowSoft)"/>
  <circle cx="400" cy="260" r="180" fill="#34d399" opacity="0.04" filter="url(#glowSoft)"/>
  <circle cx="640" cy="260" r="160" fill="#6ee7b7" opacity="0.05" filter="url(#glowSoft)"/>

  <!-- Title -->
  <text x="400" y="55" text-anchor="middle" font-size="36" font-weight="800" fill="url(#titleGrad)" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" letter-spacing="10">PRISM</text>
  <text x="400" y="79" text-anchor="middle" font-size="11" fill="#78a898" font-family="'Segoe UI', system-ui, sans-serif" letter-spacing="4" font-weight="400">SHARED AI PLATFORM</text>

  <!-- Flow arrows -->
  <g stroke-width="2" fill="none" opacity="0.5">
    <line x1="255" y1="250" x2="330" y2="250" stroke="#00d4aa" stroke-dasharray="8 4" marker-end="url(#arrowTeal)"/>
    <line x1="470" y1="250" x2="545" y2="250" stroke="#00d4aa" stroke-dasharray="8 4" marker-end="url(#arrowTeal)"/>
  </g>

  <!-- Flow labels -->
  <text x="293" y="235" text-anchor="middle" font-size="8" fill="#34d399" font-family="'Segoe UI', system-ui, sans-serif" opacity="0.7" letter-spacing="1">NORMALIZE</text>
  <text x="510" y="235" text-anchor="middle" font-size="8" fill="#34d399" font-family="'Segoe UI', system-ui, sans-serif" opacity="0.7" letter-spacing="1">EXECUTE</text>
  <text x="690" y="195" text-anchor="middle" font-size="8" fill="#34d399" font-family="'Segoe UI', system-ui, sans-serif" opacity="0.7" letter-spacing="1">RENDER</text>

