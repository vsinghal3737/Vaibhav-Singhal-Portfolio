    <text x="165" y="13" text-anchor="middle" font-size="7" fill="#12f0c6" font-family="'Segoe UI', system-ui, sans-serif" font-weight="600" letter-spacing="1">AUTH</text>
    <text x="165" y="25" text-anchor="middle" font-size="9" fill="#e8fff9" font-family="'Segoe UI', system-ui, sans-serif" font-weight="500">HMAC Bearer</text>

