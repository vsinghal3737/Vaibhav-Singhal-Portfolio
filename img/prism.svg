  <text x="294" y="183" text-anchor="middle" font-size="7.5" fill="#12f0c6" font-family="'Segoe UI', system-ui, sans-serif" opacity="0.65" letter-spacing="1">PARSE</text>
  <text x="510" y="194" text-anchor="middle" font-size="7.5" fill="#12f0c6" font-family="'Segoe UI', system-ui, sans-serif" opacity="0.65" letter-spacing="1">COMPOSE</text>

