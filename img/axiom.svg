<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#0c0b1e"/>
      <stop offset="50%" stop-color="#12102a"/>
      <stop offset="100%" stop-color="#0a0918"/>
    </linearGradient>
    <linearGradient id="gPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="gTeal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="gPink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b9d"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#00d4aa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSoft">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <g opacity="0.06">
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="#ffffff"/>
    </pattern>
    <rect width="800" height="500" fill="url(#dots)"/>
  </g>

  <!-- Ambient glow blobs -->
  <circle cx="200" cy="250" r="180" fill="#6c63ff" opacity="0.04" filter="url(#glowSoft)"/>
  <circle cx="600" cy="300" r="160" fill="#00d4aa" opacity="0.035" filter="url(#glowSoft)"/>
  <circle cx="400" cy="120" r="120" fill="#a78bfa" opacity="0.03" filter="url(#glowSoft)"/>

  <!-- Title -->
  <text x="400" y="68" text-anchor="middle" font-size="36" font-weight="800" fill="url(#titleGrad)" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" letter-spacing="10">AXIOM</text>
  <text x="400" y="92" text-anchor="middle" font-size="11" fill="#6b6b8a" font-family="'Segoe UI', system-ui, sans-serif" letter-spacing="4" font-weight="400">AI NOTE INTELLIGENCE PLATFORM</text>

  <!-- Connection lines (drawn first, behind nodes) -->
  <g stroke-width="1.5" fill="none" opacity="0.35">
    <!-- UI to API -->
    <line x1="400" y1="180" x2="260" y2="260" stroke="#6c63ff"/>
    <!-- UI to Nexus -->
    <line x1="400" y1="180" x2="540" y2="260" stroke="#6c63ff"/>
    <!-- API to Nexus -->
    <line x1="310" y1="270" x2="490" y2="270" stroke="#6c63ff" stroke-dasharray="4 4"/>
    <!-- Nexus to Pulse -->
    <line x1="540" y1="295" x2="310" y2="370" stroke="#00d4aa"/>
    <!-- Nexus to Cortex -->
    <line x1="540" y1="295" x2="490" y2="370" stroke="#00d4aa"/>
    <!-- Nexus to Synth -->
    <line x1="540" y1="295" x2="670" y2="370" stroke="#00d4aa"/>
    <!-- Pulse to Cortex flow arrow -->
    <line x1="360" y1="385" x2="445" y2="385" stroke="#00d4aa" stroke-dasharray="6 3" marker-end="url(#arrowTeal)"/>
    <!-- Cortex to Synth flow arrow -->
    <line x1="540" y1="385" x2="625" y2="385" stroke="#00d4aa" stroke-dasharray="6 3" marker-end="url(#arrowTeal)"/>
    <!-- API to Orch -->
    <line x1="220" y1="290" x2="145" y2="370" stroke="#ff6b9d" opacity="0.5"/>
    <!-- Nexus to Orch -->
    <line x1="540" y1="295" x2="145" y2="390" stroke="#ff6b9d" opacity="0.3" stroke-dasharray="3 5"/>
  </g>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00d4aa" opacity="0.5"/>
    </marker>
  </defs>

  <!-- ═══ SERVICE NODES ═══ -->

  <!-- UI Node (top center) -->
  <g filter="url(#nodeShadow)">
    <rect x="350" y="140" width="100" height="44" rx="10" fill="#16142e" stroke="#6c63ff" stroke-width="1.5"/>
    <rect x="350" y="140" width="100" height="44" rx="10" fill="#6c63ff" opacity="0.08"/>
    <text x="400" y="158" text-anchor="middle" font-size="10" fill="#a78bfa" font-family="'Segoe UI', system-ui, sans-serif" font-weight="600" letter-spacing="1">AXIOM</text>
    <text x="400" y="174" text-anchor="middle" font-size="13" fill="#e8e8f0" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700">UI</text>
    <!-- React icon hint -->
    <circle cx="432" cy="152" r="4" stroke="#61dafb" stroke-width="1" fill="none" opacity="0.6"/>
  </g>

  <!-- API Node (middle left) -->
  <g filter="url(#nodeShadow)">
    <rect x="200" y="245" width="120" height="50" rx="10" fill="#16142e" stroke="#6c63ff" stroke-width="1.5"/>
    <rect x="200" y="245" width="120" height="50" rx="10" fill="#6c63ff" opacity="0.08"/>
    <text x="260" y="264" text-anchor="middle" font-size="9" fill="#a78bfa" font-family="'Segoe UI', system-ui, sans-serif" font-weight="600" letter-spacing="1">AXIOM</text>
    <text x="260" y="282" text-anchor="middle" font-size="14" fill="#e8e8f0" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700">API</text>
    <!-- Python icon hint -->
    <circle cx="300" cy="260" r="3.5" fill="#ffd43b" opacity="0.5"/>
    <circle cx="300" cy="268" r="3.5" fill="#306998" opacity="0.5"/>
  </g>

  <!-- Nexus Node (middle right) -->
  <g filter="url(#nodeShadow)">
    <rect x="480" y="245" width="120" height="50" rx="10" fill="#16142e" stroke="#6c63ff" stroke-width="1.5"/>
    <rect x="480" y="245" width="120" height="50" rx="10" fill="#6c63ff" opacity="0.08"/>
    <text x="540" y="264" text-anchor="middle" font-size="9" fill="#a78bfa" font-family="'Segoe UI', system-ui, sans-serif" font-weight="600" letter-spacing="1">AXIOM</text>
    <text x="540" y="282" text-anchor="middle" font-size="14" fill="#e8e8f0" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700">Nexus</text>
    <!-- LLM icon hint -->
    <text x="582" y="268" font-size="11" fill="#a78bfa" opacity="0.5">⚡</text>
  </g>

  <!-- ═══ PLATFORM SERVICES (teal border = independent) ═══ -->

  <!-- Platform label -->
  <text x="490" y="348" text-anchor="middle" font-size="9" fill="#00d4aa" font-family="'Segoe UI', system-ui, sans-serif" font-weight="600" letter-spacing="2" opacity="0.5">AI PLATFORM SERVICES</text>

  <!-- Pulse Node (bottom left) -->
  <g filter="url(#nodeShadow)">
    <rect x="260" y="360" width="100" height="44" rx="10" fill="#0e1a1a" stroke="#00d4aa" stroke-width="1.5"/>
    <rect x="260" y="360" width="100" height="44" rx="10" fill="#00d4aa" opacity="0.06"/>
    <text x="310" y="378" text-anchor="middle" font-size="9" fill="#00d4aa" font-family="'Segoe UI', system-ui, sans-serif" font-weight="600" letter-spacing="1">INPUT</text>
    <text x="310" y="394" text-anchor="middle" font-size="13" fill="#e8e8f0" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700">Pulse</text>
  </g>

  <!-- Cortex Node (bottom center) -->
  <g filter="url(#nodeShadow)">
    <rect x="440" y="360" width="100" height="44" rx="10" fill="#0e1a1a" stroke="#00d4aa" stroke-width="1.5"/>
    <rect x="440" y="360" width="100" height="44" rx="10" fill="#00d4aa" opacity="0.06"/>
    <text x="490" y="378" text-anchor="middle" font-size="9" fill="#00d4aa" font-family="'Segoe UI', system-ui, sans-serif" font-weight="600" letter-spacing="1">LLM</text>
    <text x="490" y="394" text-anchor="middle" font-size="13" fill="#e8e8f0" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700">Cortex</text>
  </g>

  <!-- Synth Node (bottom right) -->
  <g filter="url(#nodeShadow)">
    <rect x="620" y="360" width="100" height="44" rx="10" fill="#0e1a1a" stroke="#00d4aa" stroke-width="1.5"/>
    <rect x="620" y="360" width="100" height="44" rx="10" fill="#00d4aa" opacity="0.06"/>
    <text x="670" y="378" text-anchor="middle" font-size="9" fill="#00d4aa" font-family="'Segoe UI', system-ui, sans-serif" font-weight="600" letter-spacing="1">OUTPUT</text>
    <text x="670" y="394" text-anchor="middle" font-size="13" fill="#e8e8f0" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700">Synth</text>
  </g>

  <!-- Orchestration Node (bottom left corner) -->
  <g filter="url(#nodeShadow)">
    <rect x="80" y="365" width="120" height="44" rx="10" fill="#1a1420" stroke="#ff6b9d" stroke-width="1" stroke-dasharray="4 3"/>
    <rect x="80" y="365" width="120" height="44" rx="10" fill="#ff6b9d" opacity="0.04"/>
    <text x="140" y="383" text-anchor="middle" font-size="8" fill="#ff6b9d" font-family="'Segoe UI', system-ui, sans-serif" font-weight="600" letter-spacing="1" opacity="0.7">DOCKER</text>
    <text x="140" y="399" text-anchor="middle" font-size="12" fill="#e8e8f0" font-family="'Segoe UI', system-ui, sans-serif" font-weight="600" opacity="0.8">Orchestration</text>
  </g>

  <!-- Legend -->
  <g transform="translate(30, 440)" opacity="0.5">
    <rect x="0" y="0" width="10" height="10" rx="2" stroke="#6c63ff" stroke-width="1.2" fill="none"/>
    <text x="16" y="9" font-size="9" fill="#8888aa" font-family="'Segoe UI', system-ui, sans-serif">Axiom Services</text>
    <rect x="120" y="0" width="10" height="10" rx="2" stroke="#00d4aa" stroke-width="1.2" fill="none"/>
    <text x="136" y="9" font-size="9" fill="#8888aa" font-family="'Segoe UI', system-ui, sans-serif">Platform Services (reusable)</text>
    <rect x="310" y="0" width="10" height="10" rx="2" stroke="#ff6b9d" stroke-width="1" fill="none" stroke-dasharray="3 2"/>
    <text x="326" y="9" font-size="9" fill="#8888aa" font-family="'Segoe UI', system-ui, sans-serif">Infrastructure</text>
  </g>

  <!-- "7 services" badge -->
  <g transform="translate(660, 445)">
    <rect x="0" y="-12" width="110" height="22" rx="11" fill="#6c63ff" opacity="0.12" stroke="#6c63ff" stroke-width="0.5" stroke-opacity="0.3"/>
    <text x="55" y="2" text-anchor="middle" font-size="10" fill="#a78bfa" font-family="'Segoe UI', system-ui, sans-serif" font-weight="600">7 Microservices</text>
  </g>

  <!-- Flow label: Pulse → Cortex → Synth -->
  <text x="400" y="425" text-anchor="middle" font-size="9" fill="#00d4aa" font-family="'Segoe UI', system-ui, sans-serif" opacity="0.4" letter-spacing="1">NORMALIZE → EXECUTE → RENDER</text>
</svg>